name: Locator Maintenance

on:
  # Run after Update Site Content finishes; Playwright job runs only when that workflow
  # uploaded the content-changed artifact (real data change). Manual dispatch always runs.
  workflow_run:
    workflows: [Update Site Content]
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  actions: read # list artifacts on the triggering Update Site Content run

jobs:
  should-run:
    runs-on: ubuntu-latest
    outputs:
      run_lm: ${{ steps.decide.outputs.run_lm }}
    steps:
      - name: Decide whether to run Playwright
        id: decide
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run_lm=true" >> "$GITHUB_OUTPUT"
            echo "Manual workflow_dispatch: running Locator Maintenance."
            exit 0
          fi
          if [ "${{ github.event_name }}" != "workflow_run" ]; then
            echo "run_lm=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "${{ github.event.workflow_run.conclusion }}" != "success" ]; then
            echo "run_lm=false" >> "$GITHUB_OUTPUT"
            echo "Update Site Content did not succeed; skipping Locator Maintenance."
            exit 0
          fi
          RUN_ID="${{ github.event.workflow_run.id }}"
          NAMES=$(gh api "repos/${{ github.repository }}/actions/runs/${RUN_ID}/artifacts" --jq '.artifacts[].name')
          if echo "$NAMES" | grep -qx 'content-changed'; then
            echo "run_lm=true" >> "$GITHUB_OUTPUT"
            echo "content-changed artifact found on run ${RUN_ID}; running Locator Maintenance."
          else
            echo "run_lm=false" >> "$GITHUB_OUTPUT"
            echo "No content-changed artifact (no projects data diff); skipping Locator Maintenance."
          fi

      - name: Summary
        if: always()
        run: |
          echo "## Locator Maintenance" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Run Playwright (verify-and-update)**: \`${{ steps.decide.outputs.run_lm }}\`" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ steps.decide.outputs.run_lm }}" != "true" ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Heavy tests were skipped. Use **workflow_dispatch** on this workflow to run them manually." >> "$GITHUB_STEP_SUMMARY"
          fi

  verify-and-update:
    needs: should-run
    if: needs.should-run.outputs.run_lm == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Install dependencies (npm)
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm i
          fi

      - name: Install Playwright browsers
        run: |
          echo "playwright_install_start=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          # chromium-iphone uses Chromium (see playwright.config.ts); WebKit adds large apt deps and host-validation noise on ubuntu-latest without install-deps.
          npx playwright install chromium firefox
          echo "playwright_install_end=$(date -u +%Y-%m-%dT%H:%M:%SZ)"

      - name: Build Spring Boot API
        working-directory: ./api
        run: ./mvnw clean package spring-boot:repackage -DskipTests

      - name: Verify JAR exists
        working-directory: ./api
        run: |
          if [ ! -f target/api-0.0.1-SNAPSHOT.jar ]; then
            echo "Error: JAR file not found!"
            exit 1
          fi
          echo "JAR file size: $(ls -lh target/api-0.0.1-SNAPSHOT.jar | awk '{print $5}')"

      - name: Start Spring Boot API server
        working-directory: ./api
        env:
          # Email configuration (non-sensitive from vars, sensitive from secrets)
          SMTP_HOST: ${{ vars.SMTP_HOST }}
          SMTP_PORT: ${{ vars.SMTP_PORT }}
          SMTP_USERNAME: ${{ vars.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          CONTACT_EMAIL: ${{ secrets.CONTACT_EMAIL }}
          SMTP_FROM_EMAIL: ${{ vars.SMTP_FROM_EMAIL }}
          # GitHub API (optional, for projects endpoint)
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          # Admin API key (optional)
          ADMIN_API_KEY: ${{ secrets.ADMIN_API_KEY }}
          # Turnstile (optional, for contact form spam protection)
          TURNSTILE_SECRET_KEY: ${{ secrets.TURNSTILE_SECRET_KEY }}
        run: |
          java -Dserver.port=8080 -jar target/api-0.0.1-SNAPSHOT.jar > api-server.log 2>&1 &
          SERVER_PID=$!
          echo $SERVER_PID > api-server.pid
          echo "API server started with PID: $SERVER_PID"
          sleep 5
          if ! kill -0 $SERVER_PID 2>/dev/null; then
            echo "ERROR: Server process died immediately!"
            echo "Server logs:"
            cat api-server.log || true
            exit 1
          fi

      - name: Wait for API server to be ready
        working-directory: ./api
        run: |
          echo "Waiting for API server to start..."
          npx wait-on http://127.0.0.1:8080/api/health --timeout 120000 --interval 2000 || {
            echo "ERROR: API server failed to start within timeout"
            echo "Checking if server process is still running:"
            if [ -f api-server.pid ]; then
              PID=$(cat api-server.pid)
              if kill -0 $PID 2>/dev/null; then
                echo "Server process $PID is still running"
              else
                echo "Server process $PID is not running"
              fi
            fi
            echo "Server logs:"
            cat api-server.log || true
            echo "Checking if port 8080 is in use:"
            lsof -i :8080 || echo "Port 8080 is not in use"
            exit 1
          }
          echo "API server is ready!"

      - name: Run UI tests
        run: npx playwright test

      - name: Stop API server
        if: always()
        working-directory: ./api
        run: |
          if [ -f api-server.pid ]; then
            kill $(cat api-server.pid) || true
            rm api-server.pid || true
          fi

      - name: Upload API server logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-server-logs
          path: api/api-server.log
          retention-days: 7
          if-no-files-found: ignore

      - name: Normalize locators and open PR (on test failure)
        if: failure()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash scripts/locator-normalize-and-pr.sh

      - name: Summary
        if: always()
        run: |
          echo "Locator maintenance completed. If tests failed and changes were needed, a PR was opened." >> $GITHUB_STEP_SUMMARY


