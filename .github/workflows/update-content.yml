name: Update Site Content

on:
  schedule:
    # Run daily at 2 AM UTC (adjust timezone as needed)
    - cron: '0 2 * * *'
  workflow_dispatch:
    # Allow manual triggering
  push:
    branches: [ master ]
    paths:
      # Trigger when API data files change
      - 'apps/api/src/main/resources/data/projects.json'
      - 'content/ProjectClassification.json'

permissions:
  contents: write      # Commit and push to branch
  pull-requests: write # Create PR when none exists

jobs:
  update-projects:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      TZ: America/New_York
      UPDATE_BRANCH: chore/update-projects-data
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Create or checkout update branch
        run: |
          git checkout -B "$UPDATE_BRANCH"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'

      - name: Install jq
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Fetch latest projects from API
        id: fetch-projects
        run: |
          # Fetch projects from production API (Render)
          API_URL="https://rickym270-github-io.onrender.com/api/projects"
          mkdir -p content/web_data
          
          echo "Fetching projects from API..."
          if curl -s -f --max-time 120 "$API_URL" > /tmp/projects.json 2>/dev/null; then
            if jq empty /tmp/projects.json 2>/dev/null; then
              PROJECT_COUNT=$(jq '. | length' /tmp/projects.json)
              echo "Fetched $PROJECT_COUNT projects from API"
              jq '.' /tmp/projects.json > content/web_data/projects.json
              echo "Normalized API JSON with jq pretty-print"
              echo "projects_count=$PROJECT_COUNT" >> $GITHUB_OUTPUT
              echo "updated=true" >> $GITHUB_OUTPUT
            else
              echo "Invalid JSON from API, keeping existing fallback"
              echo "updated=false" >> $GITHUB_OUTPUT
              if [ ! -f content/web_data/projects.json ]; then
                cp apps/api/src/main/resources/data/projects.json content/web_data/projects.json
                echo "projects_count=$(jq '. | length' content/web_data/projects.json)" >> $GITHUB_OUTPUT
              fi
            fi
          else
            echo "API unreachable (e.g. cold start); keeping existing fallback"
            echo "updated=false" >> $GITHUB_OUTPUT
            if [ ! -f content/web_data/projects.json ]; then
              cp apps/api/src/main/resources/data/projects.json content/web_data/projects.json
              echo "Seeded from curated projects.json"
            fi
            echo "projects_count=$(jq '. | length' content/web_data/projects.json)" >> $GITHUB_OUTPUT
          fi

      - name: Check for changes
        id: check-changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          if git diff --quiet content/web_data/projects.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No changes detected in projects data"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Changes detected in projects data"
            git diff content/web_data/projects.json || true
          fi

      - name: Commit and push changes
        if: steps.check-changes.outputs.changed == 'true'
        run: |
          git add content/web_data/projects.json
          git commit -m "chore: update projects data from API [skip ci]"
          echo "Using force push for automation update branch sync"
          git push origin "$UPDATE_BRANCH" --force

      - name: Upload content-changed marker for Locator Maintenance
        if: steps.check-changes.outputs.changed == 'true'
        run: mkdir -p .ci && echo "${{ github.sha }}" > .ci/content-changed.txt

      - name: Upload content-changed artifact
        if: steps.check-changes.outputs.changed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: content-changed
          path: .ci/content-changed.txt
          retention-days: 2

      - name: Create PR if none exists
        id: create-pr
        if: steps.check-changes.outputs.changed == 'true'
        run: |
          EXISTING=$(gh pr list --base master --head "$UPDATE_BRANCH" --state open --json number -q 'length')
          if [ "$EXISTING" = "0" ]; then
            gh pr create --base master --head "$UPDATE_BRANCH" \
              --title "chore: update projects data from API" \
              --body "Auto-generated by the **Update Site Content** workflow. Please review and merge to update \`content/web_data/projects.json\` (cache-first source for the Projects page)."
          else
            echo "Open PR already exists for $UPDATE_BRANCH; push updated it."
          fi
          PR_URL=$(gh pr view "$UPDATE_BRANCH" --json url -q .url 2>/dev/null || echo "")
          echo "pr_url=$PR_URL" >> $GITHUB_OUTPUT

      - name: Resolve mail recipient
        id: mail-recipient
        if: steps.check-changes.outputs.changed == 'true' && steps.create-pr.outputs.pr_url != ''
        run: |
          TO="${{ secrets.CONTACT_EMAIL }}"
          SOURCE="CONTACT_EMAIL secret"
          if [ -z "$TO" ]; then
            TO="${{ vars.SMTP_USERNAME }}"
            SOURCE="SMTP_USERNAME var"
          fi
          if [ -z "$TO" ]; then
            TO="${{ vars.SMTP_FROM_EMAIL }}"
            SOURCE="SMTP_FROM_EMAIL var"
          fi
          echo "mail_recipient_source=$SOURCE" >> "$GITHUB_OUTPUT"
          echo "mail_recipient_configured=$([ -n "$TO" ] && echo true || echo false)" >> "$GITHUB_OUTPUT"
          if [ -n "$TO" ]; then
            echo "to=$TO" >> "$GITHUB_OUTPUT"
            echo "Notification recipient resolved from $SOURCE"
          else
            echo "::warning::No mail recipient configured (set CONTACT_EMAIL secret or SMTP_USERNAME var)"
          fi

      - name: Send email notification
        if: steps.check-changes.outputs.changed == 'true' && steps.create-pr.outputs.pr_url != '' && steps.mail-recipient.outputs.mail_recipient_configured == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ vars.SMTP_HOST }}
          server_port: ${{ vars.SMTP_PORT }}
          secure: false
          username: ${{ vars.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "[rickym270.github.io] Projects data update PR ready for review"
          to: ${{ steps.mail-recipient.outputs.to }}
          from: GitHub Actions <${{ vars.SMTP_FROM_EMAIL }}>
          body: |
            The Update Site Content workflow has updated projects data and opened or updated a PR.

            Project count: ${{ steps.fetch-projects.outputs.projects_count }}

            PR: ${{ steps.create-pr.outputs.pr_url }}

            Please review and merge when ready to update the cache-first source for the Projects page.

      - name: Summary
        if: always()
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Update Site Content" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.check-changes.outputs.changed }}" == "true" ]; then
            echo "✅ Updated projects data: **${{ steps.fetch-projects.outputs.projects_count }}** projects" >> $GITHUB_STEP_SUMMARY
            echo "📌 Changes pushed to \`chore/update-projects-data\`. Open or existing PR is ready for review and merge to \`master\`." >> $GITHUB_STEP_SUMMARY
            if [ "${{ steps.mail-recipient.outputs.mail_recipient_configured }}" == "true" ]; then
              echo "📧 Email notification sent to recipient from \`${{ steps.mail-recipient.outputs.mail_recipient_source }}\`." >> $GITHUB_STEP_SUMMARY
            elif [ "${{ steps.create-pr.outputs.pr_url }}" != "" ]; then
              echo "⚠️ Email notification skipped — no recipient (set \`CONTACT_EMAIL\` secret or \`SMTP_USERNAME\` var)." >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "ℹ️  No changes detected - projects data is up to date" >> $GITHUB_STEP_SUMMARY
          fi

