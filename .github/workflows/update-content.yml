name: Update Site Content

on:
  schedule:
    # Run daily at 2 AM UTC (adjust timezone as needed)
    - cron: '0 2 * * *'
  workflow_dispatch:
    # Allow manual triggering
  push:
    branches: [ master ]
    paths:
      # Trigger when API data files change
      - 'api/src/main/resources/data/projects.json'
      - 'data/ProjectClassification.json'

permissions:
  contents: write      # Commit and push to branch
  pull-requests: write # Create PR when none exists

jobs:
  update-projects:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      TZ: America/New_York
      UPDATE_BRANCH: chore/update-projects-data
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Create or checkout update branch
        run: |
          git checkout -B "$UPDATE_BRANCH"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'

      - name: Install jq
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Fetch latest projects from API
        id: fetch-projects
        run: |
          # Fetch projects from production API (Render)
          API_URL="https://rickym270-github-io.onrender.com/api/projects"
          mkdir -p data/web_data
          
          echo "Fetching projects from API..."
          if curl -s -f --max-time 120 "$API_URL" > /tmp/projects.json 2>/dev/null; then
            if jq empty /tmp/projects.json 2>/dev/null; then
              PROJECT_COUNT=$(jq '. | length' /tmp/projects.json)
              echo "Fetched $PROJECT_COUNT projects from API"
              jq '.' /tmp/projects.json > data/web_data/projects.json
              echo "Normalized API JSON with jq pretty-print"
              echo "projects_count=$PROJECT_COUNT" >> $GITHUB_OUTPUT
              echo "updated=true" >> $GITHUB_OUTPUT
            else
              echo "Invalid JSON from API, keeping existing fallback"
              echo "updated=false" >> $GITHUB_OUTPUT
              if [ ! -f data/web_data/projects.json ]; then
                cp api/src/main/resources/data/projects.json data/web_data/projects.json
                echo "projects_count=$(jq '. | length' data/web_data/projects.json)" >> $GITHUB_OUTPUT
              fi
            fi
          else
            echo "API unreachable (e.g. cold start); keeping existing fallback"
            echo "updated=false" >> $GITHUB_OUTPUT
            if [ ! -f data/web_data/projects.json ]; then
              cp api/src/main/resources/data/projects.json data/web_data/projects.json
              echo "Seeded from curated projects.json"
            fi
            echo "projects_count=$(jq '. | length' data/web_data/projects.json)" >> $GITHUB_OUTPUT
          fi

      - name: Check for changes
        id: check-changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          if git diff --quiet data/web_data/projects.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No changes detected in projects data"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Changes detected in projects data"
            git diff data/web_data/projects.json || true
          fi

      - name: Commit and push changes
        if: steps.check-changes.outputs.changed == 'true'
        run: |
          git add data/web_data/projects.json
          git commit -m "chore: update projects data from API [skip ci]"
          echo "Using force push for automation update branch sync"
          git push origin "$UPDATE_BRANCH" --force

      - name: Create PR if none exists
        id: create-pr
        if: steps.check-changes.outputs.changed == 'true'
        run: |
          EXISTING=$(gh pr list --base master --head "$UPDATE_BRANCH" --state open --json number -q 'length')
          if [ "$EXISTING" = "0" ]; then
            gh pr create --base master --head "$UPDATE_BRANCH" \
              --title "chore: update projects data from API" \
              --body "Auto-generated by the **Update Site Content** workflow. Please review and merge to update \`data/web_data/projects.json\` (cache-first source for the Projects page)."
          else
            echo "Open PR already exists for $UPDATE_BRANCH; push updated it."
          fi
          PR_URL=$(gh pr view "$UPDATE_BRANCH" --json url -q .url 2>/dev/null || echo "")
          echo "pr_url=$PR_URL" >> $GITHUB_OUTPUT

      - name: Send email notification
        if: steps.check-changes.outputs.changed == 'true' && steps.create-pr.outputs.pr_url != ''
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ vars.SMTP_HOST }}
          server_port: ${{ vars.SMTP_PORT }}
          secure: false
          username: ${{ vars.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "[rickym270.github.io] Projects data update PR ready for review"
          to: ${{ secrets.CONTACT_EMAIL }}
          from: GitHub Actions <${{ vars.SMTP_FROM_EMAIL }}>
          body: |
            The Update Site Content workflow has updated projects data and opened or updated a PR.

            Project count: ${{ steps.fetch-projects.outputs.projects_count }}

            PR: ${{ steps.create-pr.outputs.pr_url }}

            Please review and merge when ready to update the cache-first source for the Projects page.

      - name: Summary
        if: always()
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Update Site Content" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.check-changes.outputs.changed }}" == "true" ]; then
            echo "✅ Updated projects data: **${{ steps.fetch-projects.outputs.projects_count }}** projects" >> $GITHUB_STEP_SUMMARY
            echo "📌 Changes pushed to \`chore/update-projects-data\`. Open or existing PR is ready for review and merge to \`master\`." >> $GITHUB_STEP_SUMMARY
          else
            echo "ℹ️  No changes detected - projects data is up to date" >> $GITHUB_STEP_SUMMARY
          fi

