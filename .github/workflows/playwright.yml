name: Playwright Tests

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [ master ]
  push:
    branches: [ master, playwright_failures_fix ]
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # PR only: fast gate with sanity tests (API only, no browser install)
  sanity:
    name: Sanity (PR)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    timeout-minutes: 15
    env:
      TZ: America/New_York
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for skip keywords
        id: skip-check
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            { echo "$PR_TITLE"; echo "$PR_BODY"; } > /tmp/pr_text.txt 2>/dev/null || echo "$PR_TITLE" > /tmp/pr_text.txt
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
            if [ -n "$BASE_SHA" ] && [ -n "$HEAD_SHA" ]; then
              git log --format=%B $BASE_SHA..$HEAD_SHA >> /tmp/pr_text.txt 2>/dev/null || git log --format=%B -10 >> /tmp/pr_text.txt
            else
              git log --format=%B -10 >> /tmp/pr_text.txt
            fi
            COMMIT_MESSAGES=$(cat /tmp/pr_text.txt 2>/dev/null || echo "")
          else
            COMMIT_MESSAGES="$(git log --format=%B -10)"
          fi
          COMMIT_MESSAGES_LOWER=$(echo "$COMMIT_MESSAGES" | tr '[:upper:]' '[:lower:]')
          SKIP_ALL=false
          SKIP_API=false
          if echo "$COMMIT_MESSAGES_LOWER" | grep -q "^\[skip ci\]"; then SKIP_ALL=true; fi
          if echo "$COMMIT_MESSAGES_LOWER" | grep -q "^\[skip api\]"; then SKIP_API=true; fi
          if [ -n "$ACT" ]; then SKIP_API=true; fi
          echo "skip_all=$SKIP_ALL" >> $GITHUB_OUTPUT
          echo "skip_api=$SKIP_API" >> $GITHUB_OUTPUT

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Install dependencies
        run: npm i

      - name: Skip sanity (no API tests)
        if: steps.skip-check.outputs.skip_all == 'true' || steps.skip-check.outputs.skip_api == 'true'
        run: |
          echo "Skipping sanity job (skip_all=${{ steps.skip-check.outputs.skip_all }}, skip_api=${{ steps.skip-check.outputs.skip_api }})"
          exit 0

      - name: Build Spring Boot API
        if: steps.skip-check.outputs.skip_all != 'true' && steps.skip-check.outputs.skip_api != 'true'
        working-directory: ./api
        run: ./mvnw clean package spring-boot:repackage -DskipTests

      - name: Verify JAR exists
        if: steps.skip-check.outputs.skip_all != 'true' && steps.skip-check.outputs.skip_api != 'true'
        working-directory: ./api
        run: |
          if [ ! -f target/api-0.0.1-SNAPSHOT.jar ]; then
            echo "Error: JAR file not found!"
            exit 1
          fi

      - name: Start Spring Boot API server
        if: steps.skip-check.outputs.skip_all != 'true' && steps.skip-check.outputs.skip_api != 'true'
        working-directory: ./api
        env:
          SMTP_HOST: ${{ vars.SMTP_HOST }}
          SMTP_PORT: ${{ vars.SMTP_PORT }}
          SMTP_USERNAME: ${{ vars.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          CONTACT_EMAIL: ${{ secrets.CONTACT_EMAIL }}
          SMTP_FROM_EMAIL: ${{ vars.SMTP_FROM_EMAIL }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          FEATURE_GITHUB_PROJECT_SYNC: "false"
          ADMIN_API_KEY: ${{ secrets.ADMIN_API_KEY }}
          TURNSTILE_SECRET_KEY: ${{ secrets.TURNSTILE_SECRET_KEY }}
        run: |
          java -Dserver.port=8080 -jar target/api-0.0.1-SNAPSHOT.jar > api-server.log 2>&1 &
          echo $! > api-server.pid
          sleep 5
          if ! kill -0 $(cat api-server.pid) 2>/dev/null; then
            echo "ERROR: Server process died immediately!"
            cat api-server.log || true
            exit 1
          fi

      - name: Wait for API server to be ready
        if: steps.skip-check.outputs.skip_all != 'true' && steps.skip-check.outputs.skip_api != 'true'
        working-directory: ./api
        run: |
          npx wait-on http://127.0.0.1:8080/api/health --timeout 120000 --interval 2000 || {
            echo "ERROR: API server failed to start"
            cat api-server.log || true
            exit 1
          }

      - name: Run sanity tests
        if: steps.skip-check.outputs.skip_all != 'true' && steps.skip-check.outputs.skip_api != 'true'
        timeout-minutes: 10
        run: npx playwright test --project=api --grep '\[sanity\]' --reporter=list,github

      - name: Stop API server
        if: always()
        working-directory: ./api
        run: |
          if [ -f api-server.pid ]; then
            kill $(cat api-server.pid) 2>/dev/null || true
            rm -f api-server.pid
          fi

      - name: Upload API server logs
        if: always() && env.ACT == ''
        uses: actions/upload-artifact@v4
        with:
          name: api-server-logs-sanity
          path: api/api-server.log
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload HTML report
        if: always() && env.ACT == ''
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-sanity
          path: playwright-report
          retention-days: 7
          if-no-files-found: ignore

  # PR and master: full suite (regression + integration) with sharding. Run on PR so merge requires passing suite; run on push/schedule/dispatch only when ref is master.
  full-suite:
    name: Full suite (shard ${{ matrix.shardIndex }}/${{ matrix.shardTotal }})
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/master'
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        shardIndex: [1, 2, 3, 4, 5]
        shardTotal: [5]
    env:
      TZ: America/New_York
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for skip keywords
        id: skip-check
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            { echo "$PR_TITLE"; echo "$PR_BODY"; } > /tmp/pr_text.txt 2>/dev/null || echo "$PR_TITLE" > /tmp/pr_text.txt
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
            if [ -n "$BASE_SHA" ] && [ -n "$HEAD_SHA" ]; then
              git log --format=%B $BASE_SHA..$HEAD_SHA >> /tmp/pr_text.txt 2>/dev/null || git log --format=%B -10 >> /tmp/pr_text.txt
            else
              git log --format=%B -10 >> /tmp/pr_text.txt
            fi
            COMMIT_MESSAGES=$(cat /tmp/pr_text.txt 2>/dev/null || echo "")
          else
            COMMIT_MESSAGES="$(git log --format=%B -10)"
          fi
          COMMIT_MESSAGES_LOWER=$(echo "$COMMIT_MESSAGES" | tr '[:upper:]' '[:lower:]')
          SKIP_ALL=false
          SKIP_UI=false
          SKIP_API=false
          SKIP_PERF=false
          SKIP_ADA=false
          SKIP_LOAD=false
          if echo "$COMMIT_MESSAGES_LOWER" | grep -q "^\[skip ci\]"; then SKIP_ALL=true; fi
          if echo "$COMMIT_MESSAGES_LOWER" | grep -q "^\[skip ui\]"; then SKIP_UI=true; fi
          if echo "$COMMIT_MESSAGES_LOWER" | grep -q "^\[skip api\]"; then SKIP_API=true; fi
          if echo "$COMMIT_MESSAGES_LOWER" | grep -q "^\[skip perf\]"; then SKIP_PERF=true; fi
          if echo "$COMMIT_MESSAGES_LOWER" | grep -q "^\[skip ada\]"; then SKIP_ADA=true; fi
          if echo "$COMMIT_MESSAGES_LOWER" | grep -q "^\[skip load\]"; then SKIP_LOAD=true; fi
          if [ -n "$ACT" ]; then SKIP_API=true; fi
          echo "skip_all=$SKIP_ALL" >> $GITHUB_OUTPUT
          echo "skip_ui=$SKIP_UI" >> $GITHUB_OUTPUT
          echo "skip_api=$SKIP_API" >> $GITHUB_OUTPUT
          echo "skip_perf=$SKIP_PERF" >> $GITHUB_OUTPUT
          echo "skip_ada=$SKIP_ADA" >> $GITHUB_OUTPUT
          echo "skip_load=$SKIP_LOAD" >> $GITHUB_OUTPUT
          PROJECTS=""
          if [ "$SKIP_ALL" != "true" ]; then
            [ "$SKIP_UI" != "true" ] && PROJECTS="$PROJECTS --project=chromium --project=chromium-iphone --project=firefox"
            [ "$SKIP_API" != "true" ] && PROJECTS="$PROJECTS --project=api"
          fi
          echo "projects=$PROJECTS" >> $GITHUB_OUTPUT

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Install dependencies
        run: npm i

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Skip full-suite
        if: steps.skip-check.outputs.skip_all == 'true'
        run: |
          echo "Skipping full-suite (skip_all=true)"
          exit 0

      - name: Build Spring Boot API
        if: steps.skip-check.outputs.skip_all != 'true' && steps.skip-check.outputs.skip_api != 'true'
        working-directory: ./api
        run: ./mvnw clean package spring-boot:repackage -DskipTests

      - name: Verify JAR exists
        if: steps.skip-check.outputs.skip_all != 'true' && steps.skip-check.outputs.skip_api != 'true'
        working-directory: ./api
        run: |
          if [ ! -f target/api-0.0.1-SNAPSHOT.jar ]; then
            echo "Error: JAR file not found!"
            exit 1
          fi
          echo "JAR file size: $(ls -lh target/api-0.0.1-SNAPSHOT.jar | awk '{print $5}')"

      - name: Start Spring Boot API server
        if: steps.skip-check.outputs.skip_all != 'true' && steps.skip-check.outputs.skip_api != 'true'
        working-directory: ./api
        env:
          SMTP_HOST: ${{ vars.SMTP_HOST }}
          SMTP_PORT: ${{ vars.SMTP_PORT }}
          SMTP_USERNAME: ${{ vars.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          CONTACT_EMAIL: ${{ secrets.CONTACT_EMAIL }}
          SMTP_FROM_EMAIL: ${{ vars.SMTP_FROM_EMAIL }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          FEATURE_GITHUB_PROJECT_SYNC: "false"
          ADMIN_API_KEY: ${{ secrets.ADMIN_API_KEY }}
          TURNSTILE_SECRET_KEY: ${{ secrets.TURNSTILE_SECRET_KEY }}
        run: |
          java -Dserver.port=8080 -jar target/api-0.0.1-SNAPSHOT.jar > api-server.log 2>&1 &
          echo $! > api-server.pid
          echo "API server started with PID $(cat api-server.pid)"
          sleep 5
          if ! kill -0 $(cat api-server.pid) 2>/dev/null; then
            echo "ERROR: Server process died immediately!"
            cat api-server.log || true
            exit 1
          fi

      - name: Wait for API server to be ready
        if: steps.skip-check.outputs.skip_all != 'true' && steps.skip-check.outputs.skip_api != 'true'
        working-directory: ./api
        run: |
          echo "Waiting for API server to start..."
          npx wait-on http://127.0.0.1:8080/api/health --timeout 120000 --interval 2000 || {
            echo "ERROR: API server failed to start within timeout"
            [ -f api-server.pid ] && kill -0 $(cat api-server.pid) 2>/dev/null && echo "Process still running" || echo "Process not running"
            cat api-server.log || true
            exit 1
          }
          echo "API server is ready!"

      - name: Start UI server
        if: steps.skip-check.outputs.skip_all != 'true' && steps.skip-check.outputs.projects != ''
        run: |
          echo "UI server start time: $(date -u)" > ui-server.log
          node scripts/start-web-server-simple.js >> ui-server.log 2>&1 &
          echo $! > ui-server.pid
          echo "UI server started with PID $(cat ui-server.pid) on port 4321"
          sleep 2
          kill -0 $(cat ui-server.pid) 2>/dev/null && echo "UI server process is running" || echo "UI server process is NOT running"

      - name: Wait for UI server to be ready
        if: steps.skip-check.outputs.skip_all != 'true' && steps.skip-check.outputs.projects != ''
        run: |
          echo "Waiting for UI server on port 4321..."
          npx wait-on http://127.0.0.1:4321/ --timeout 60000 --interval 2000 || {
            echo "ERROR: UI server failed to start"
            [ -f ui-server.pid ] && kill -0 $(cat ui-server.pid) 2>/dev/null && echo "Process still running" || echo "Process not running"
            cat ui-server.log || true
            exit 1
          }
          echo "UI server is ready!"

      - name: Run regression and integration tests (shard)
        if: steps.skip-check.outputs.skip_all != 'true' && steps.skip-check.outputs.projects != ''
        timeout-minutes: 55
        run: |
          if [ -z "${{ steps.skip-check.outputs.projects }}" ]; then
            echo "No projects to run (all skipped)"
            exit 0
          fi
          echo "Running shard ${{ matrix.shardIndex }}/${{ matrix.shardTotal }} with projects: ${{ steps.skip-check.outputs.projects }}"
          npx playwright test ${{ steps.skip-check.outputs.projects }} --grep '\[regression\]|\[integration\]' --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }} --reporter=list,github || {
            echo "Tests failed or timed out"
            curl -s http://127.0.0.1:4321/ > /dev/null && echo "UI server responding" || echo "UI server NOT responding"
            exit 1
          }

      - name: Skip full-suite notification
        if: steps.skip-check.outputs.skip_all == 'true' || (steps.skip-check.outputs.projects == '' && steps.skip-check.outputs.skip_all != 'true')
        run: |
          [ "${{ steps.skip-check.outputs.skip_all }}" = "true" ] && echo "All tests skipped due to [skip ci]" || echo "All test types skipped - no projects"

      - name: Stop API server
        if: always()
        working-directory: ./api
        run: |
          if [ -f api-server.pid ]; then
            kill $(cat api-server.pid) 2>/dev/null || true
            rm -f api-server.pid
          fi

      - name: Stop UI server
        if: always()
        run: |
          if [ -f ui-server.pid ]; then
            kill $(cat ui-server.pid) 2>/dev/null || true
            rm -f ui-server.pid
          fi
          fuser -k 4321/tcp 2>/dev/null || true
          pkill -f "start-web-server-simple" 2>/dev/null || true

      - name: Upload API server logs
        if: always() && env.ACT == ''
        uses: actions/upload-artifact@v4
        with:
          name: api-server-logs-shard-${{ matrix.shardIndex }}
          path: api/api-server.log
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload UI server logs
        if: always() && env.ACT == ''
        uses: actions/upload-artifact@v4
        with:
          name: ui-server-logs-shard-${{ matrix.shardIndex }}
          path: ui-server.log
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload HTML report
        if: always() && env.ACT == ''
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-shard-${{ matrix.shardIndex }}
          path: playwright-report
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload test results
        if: always() && env.ACT == ''
        uses: actions/upload-artifact@v4
        with:
          name: test-results-shard-${{ matrix.shardIndex }}
          path: test-results
          retention-days: 7
          if-no-files-found: ignore

      - name: Job summary
        if: always()
        run: echo "Playwright shard ${{ matrix.shardIndex }}/${{ matrix.shardTotal }} report and test-results uploaded as artifacts." >> $GITHUB_STEP_SUMMARY
