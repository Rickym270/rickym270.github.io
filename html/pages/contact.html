<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-translate-title="contact.title">Contact</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css" integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous" />
    <link rel="stylesheet" href="/html/css/modern.css" />
    <link rel="stylesheet" href="/html/css/style.css" />
</head>
<body>
    <div class="container container-padding-top">
        <div class="section">
            <h1 class="section-title" data-translate="contact.title">Contact Me</h1>
            <p class="section-subtitle" data-translate="contact.subtitle">Have a question or want to collaborate? Send me a message!</p>
            <p class="mb-0">
                <a href="data/web_data/Martinez Ricky - Sr. SDET.pdf" download="Martinez-Ricky-Sr-SDET.pdf" target="_blank" rel="noopener noreferrer" class="btn btn-outline-primary btn-sm" data-translate="contact.downloadResume">Download resume</a>
            </p>
        </div>

        <div class="section">
            <div class="row">
                <div class="col-12">
                    <form id="contact-form" class="contact-form">
                        <div class="form-group">
                            <label for="name" data-translate="contact.name">Name <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="name" name="name" required 
                                   minlength="1" maxlength="100" data-translate-placeholder="contact.namePlaceholder" placeholder="Your name">
                            <small class="form-text text-muted" data-translate="contact.required">Required</small>
                        </div>

                        <div class="form-group">
                            <label for="email" data-translate="contact.email">Email <span class="text-danger">*</span></label>
                            <input type="email" class="form-control" id="email" name="email" required 
                                   data-translate-placeholder="contact.emailPlaceholder" placeholder="your.email@example.com">
                            <small class="form-text text-muted" data-translate="contact.emailNote">Required - We'll never share your email</small>
                        </div>

                        <div class="form-group">
                            <label for="subject" data-translate="contact.subject">Subject <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="subject" name="subject" required 
                                   minlength="1" maxlength="200" data-translate-placeholder="contact.subjectPlaceholder" placeholder="What's this about?">
                            <small class="form-text text-muted" data-translate="contact.required">Required</small>
                        </div>

                        <div class="form-group">
                            <label for="message" data-translate="contact.message">Message <span class="text-danger">*</span></label>
                            <textarea class="form-control" id="message" name="message" rows="6" required 
                                      minlength="1" maxlength="2000" data-translate-placeholder="contact.messagePlaceholder" placeholder="Tell me what's on your mind..."></textarea>
                            <small class="form-text text-muted" data-translate="contact.messageNote">Required - Max 2000 characters</small>
                        </div>

                        <!-- Honeypot field - hidden from users, bots will fill it -->
                        <div class="honeypot-field">
                            <label for="website">Website (leave blank)</label>
                            <input type="text" id="website" name="honeypot" tabindex="-1" autocomplete="off">
                        </div>

                        <!-- Cloudflare Turnstile CAPTCHA (only shown if site key is configured) -->
                        <div id="turnstile-container" class="form-group d-none">
                            <div class="cf-turnstile" data-sitekey="YOUR_SITE_KEY_HERE" data-theme="auto"></div>
                        </div>

                        <div id="form-message" class="alert d-none" role="alert"></div>

                        <button type="submit" class="btn btn-primary btn-lg w-100" id="submit-btn">
                            <span id="submit-text" data-translate="contact.sendMessage">Send Message</span>
                            <span id="submit-spinner" class="spinner-border spinner-border-sm d-none" role="status" aria-hidden="true"></span>
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.js"></script>
    <!-- Only load Turnstile script if site key is configured -->
    <script>
        // Turnstile site key - replace with your actual site key, or leave as placeholder to disable
        // To disable Turnstile, set to 'YOUR_SITE_KEY_HERE' or empty string
        // Use var so SPA re-load of this page does not throw "already been declared"
        var TURNSTILE_SITE_KEY = 'YOUR_SITE_KEY_HERE';
        
        // Helper function to check if Turnstile is properly configured
        function isTurnstileConfigured() {
            return TURNSTILE_SITE_KEY && 
                   TURNSTILE_SITE_KEY !== 'YOUR_SITE_KEY_HERE' && 
                   TURNSTILE_SITE_KEY.trim().length > 0 &&
                   TURNSTILE_SITE_KEY.length > 20; // Valid Turnstile keys are longer
        }
        
        // Only load Turnstile if site key is properly configured
        if (isTurnstileConfigured()) {
            const script = document.createElement('script');
            script.src = 'https://challenges.cloudflare.com/turnstile/v0/api.js';
            script.async = true;
            script.defer = true;
            script.onerror = function() {
                console.warn('[Turnstile] Failed to load Turnstile script. Spam protection disabled.');
            };
            script.onload = function() {
                // Show Turnstile widget and update site key
                const container = document.getElementById('turnstile-container');
                const widget = document.querySelector('.cf-turnstile');
                if (container && widget) {
                    container.style.display = 'block';
                    widget.setAttribute('data-sitekey', TURNSTILE_SITE_KEY);
                }
            };
            document.head.appendChild(script);
        } else {
            console.log('[Turnstile] Not configured - form will work without CAPTCHA');
        }
    </script>
    <script src="/html/js/api.js"></script>
    <script>
        // Global error handler for unhandled promise rejections
        window.addEventListener('unhandledrejection', function(event) {
            console.error('Unhandled promise rejection:', event.reason);
            // Prevent the error from showing in console (we'll handle it ourselves)
            // But log it for debugging
            if (event.reason && event.reason.message && event.reason.message.includes('message channel')) {
                // This is often caused by browser extensions, ignore it
                console.warn('Browser extension interference detected (message channel error). This is usually harmless.');
                event.preventDefault(); // Prevent default error logging
            }
        });
        
        (function() {
            const form = document.getElementById('contact-form');
            const messageDiv = document.getElementById('form-message');
            const submitBtn = document.getElementById('submit-btn');
            const submitText = document.getElementById('submit-text');
            const submitSpinner = document.getElementById('submit-spinner');
            
            // Use the global TURNSTILE_SITE_KEY declared above, don't redeclare
            // Helper function to check if Turnstile is properly configured
            function isTurnstileConfigured() {
                return typeof TURNSTILE_SITE_KEY !== 'undefined' &&
                       TURNSTILE_SITE_KEY && 
                       TURNSTILE_SITE_KEY !== 'YOUR_SITE_KEY_HERE' && 
                       TURNSTILE_SITE_KEY.trim().length > 0 &&
                       TURNSTILE_SITE_KEY.length > 20; // Valid Turnstile keys are longer
            }

            function showMessage(text, isError = false) {
                // Translate the message if it matches known error patterns
                let displayText = text && text.trim() ? text.trim() : (isError ? 'An error occurred. Please try again.' : 'Success!');
                
                if (isError && typeof window.TranslationManager !== 'undefined') {
                    // Map common error messages to translation keys
                    const errorMappings = {
                        'Please wait before submitting another message': 'contact.errorRateLimit',
                        'Please fill in all required fields': 'contact.errorValidation',
                        'Please enter a valid email address': 'contact.errorEmail',
                        'Spam detected. Message not sent': 'contact.errorSpam',
                        'CAPTCHA verification failed': 'contact.errorCaptcha',
                        'Request timed out': 'contact.errorTimeout',
                        'Server error occurred': 'contact.errorServer'
                    };
                    
                    // Check if the error message matches any known patterns
                    for (const [pattern, key] of Object.entries(errorMappings)) {
                        if (displayText.includes(pattern)) {
                            displayText = window.TranslationManager.t(key);
                            break;
                        }
                    }
                }
                
                messageDiv.textContent = displayText;
                messageDiv.className = 'alert ' + (isError ? 'alert-danger' : 'alert-success');
                messageDiv.style.display = 'block';
                messageDiv.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }

            function hideMessage() {
                messageDiv.style.display = 'none';
            }

            function setSubmitting(isSubmitting) {
                submitBtn.disabled = isSubmitting;
                submitText.style.display = isSubmitting ? 'none' : 'inline';
                submitSpinner.style.display = isSubmitting ? 'inline-block' : 'none';
            }

            // Wait for Turnstile to load (removed - now handled in script loading)

            form.addEventListener('submit', async function(e) {
                e.preventDefault();
                // #region agent log contact submit handler entry
                console.log('[contact-debug] submit handler entered', {
                    defaultPrevented: !!e.defaultPrevented,
                    nameProvided: !!document.getElementById('name')?.value,
                    emailProvided: !!document.getElementById('email')?.value,
                    subjectProvided: !!document.getElementById('subject')?.value
                });
                // #endregion
                /* #region agent log contact submit handler entry ingest */
                // Must be valid plain JS; TypeScript-only syntax breaks DOM insertion and prevents SPA submit handling.
                try {
                    fetch('http://127.0.0.1:7242/ingest/6a51373e-0e77-47ee-bede-f80eb24e3f5c', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'X-Debug-Session-Id': '9313fb'
                        },
                        body: JSON.stringify({
                            sessionId: '9313fb',
                            runId: 'pre',
                            hypothesisId: 'H2',
                            location: 'contact.html:submit',
                            message: 'submitHandlerEntered',
                            data: {},
                            timestamp: Date.now()
                        })
                    }).catch(function(){});
                } catch (_) {}
                /* #endregion */
                hideMessage();

                const name = document.getElementById('name').value.trim();
                const email = document.getElementById('email').value.trim();
                const subject = document.getElementById('subject').value.trim();
                const message = document.getElementById('message').value.trim();
                const honeypot = document.getElementById('website').value.trim();

                // Client-side validation
                if (!name || !email || !subject || !message) {
                    const errorMsg = typeof window.TranslationManager !== 'undefined' 
                        ? window.TranslationManager.t('contact.errorValidation')
                        : 'Please fill in all required fields.';
                    showMessage(errorMsg, true);
                    return;
                }

                // Email validation
                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                if (!emailRegex.test(email)) {
                    const errorMsg = typeof window.TranslationManager !== 'undefined' 
                        ? window.TranslationManager.t('contact.errorEmail')
                        : 'Please enter a valid email address.';
                    showMessage(errorMsg, true);
                    return;
                }

                // Check honeypot
                if (honeypot) {
                    const errorMsg = typeof window.TranslationManager !== 'undefined' 
                        ? window.TranslationManager.t('contact.errorSpam')
                        : 'Spam detected. Message not sent.';
                    showMessage(errorMsg, true);
                    return;
                }

                // Get Turnstile token (only if Turnstile is configured and loaded)
                let turnstileToken = '';
                
                if (isTurnstileConfigured()) {
                    if (typeof turnstile === 'undefined') {
                        // Turnstile is configured but not loaded yet
                        showMessage('Security verification is loading. Please wait a moment and try again.', true);
                        return;
                    }
                    
                    try {
                        turnstileToken = turnstile.getResponse();
                        if (!turnstileToken) {
                            showMessage('Please complete the security verification.', true);
                            return;
                        }
                    } catch (error) {
                        console.error('Turnstile error:', error);
                        // If Turnstile fails, allow submission anyway (backend will handle verification)
                        console.warn('Turnstile verification failed, submitting without token');
                    }
                }
                // If Turnstile is not configured, allow submission without token (backend will handle it)

                setSubmitting(true);
                const submitStartTs = Date.now();

                try {
                    // Use API if available, otherwise fallback
                    const API_BASE_URL = (typeof window.API_BASE_URL !== 'undefined') 
                        ? window.API_BASE_URL 
                        : 'https://YOUR_RENDER_APP.onrender.com';
                    // #region agent log contact api base
                    console.log('[contact-debug] API_BASE_URL resolved', { apiBaseUrl: API_BASE_URL });
                    // #endregion

                    // #region agent log contact submit start
                    fetch('http://127.0.0.1:7242/ingest/6a51373e-0e77-47ee-bede-f80eb24e3f5c',{method:'POST',headers:{'Content-Type':'application/json','X-Debug-Session-Id':'9313fb'},body:JSON.stringify({sessionId:'9313fb',runId:'pre',hypothesisId:'A',location:'contact.html:submitStart',message:'submit started',data:{isMobileViewport: (window.innerWidth <= 768),apiBaseUrl: API_BASE_URL,turnstileConfigured: isTurnstileConfigured()},timestamp:Date.now()})}).catch(()=>{});
                    // #endregion

                    // Wrap fetch in Promise to handle all errors
                    let response;
                    var clientTimeoutFired = false;
                    try {
                        // Add timeout to prevent hanging (allow 60s for Render cold start)
                        const controller = new AbortController();
                        // Allow longer: Render cold starts can exceed 60s in some conditions.
                        const TIMEOUT_MS = 180000;
                        const timeoutId = setTimeout(function() {
                            clientTimeoutFired = true;
                            console.log('[contact] timeout fired after', TIMEOUT_MS, 'ms; aborting fetch');
                            // #region agent log contact abort timeout callback
                            fetch('http://127.0.0.1:7242/ingest/6a51373e-0e77-47ee-bede-f80eb24e3f5c',{method:'POST',headers:{'Content-Type':'application/json','X-Debug-Session-Id':'9313fb'},body:JSON.stringify({sessionId:'9313fb',runId:'pre',hypothesisId:'B',location:'contact.html:timeoutCallback',message:'timeout aborting fetch',data:{elapsedMs: Date.now() - submitStartTs,TIMEOUT_MS},timestamp:Date.now()})}).catch(()=>{});
                            // #endregion
                            controller.abort();
                        }, TIMEOUT_MS);
                        
                        // #region agent log contact fetch before request
                        fetch('http://127.0.0.1:7242/ingest/6a51373e-0e77-47ee-bede-f80eb24e3f5c',{method:'POST',headers:{'Content-Type':'application/json','X-Debug-Session-Id':'9313fb'},body:JSON.stringify({sessionId:'9313fb',runId:'pre',hypothesisId:'A',location:'contact.html:beforeFetch',message:'about to POST /api/contact',data:{url:`${API_BASE_URL}/api/contact`,timeoutMs: TIMEOUT_MS},timestamp:Date.now()})}).catch(()=>{});
                        // #endregion

                        response = await fetch(`${API_BASE_URL}/api/contact`, {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                            },
                            body: JSON.stringify({
                                name: name,
                                email: email,
                                subject: subject,
                                message: message,
                                honeypot: honeypot || '',
                                turnstileToken: turnstileToken || ''
                            }),
                            signal: controller.signal
                        });
                        
                        // #region agent log contact fetch response received
                        fetch('http://127.0.0.1:7242/ingest/6a51373e-0e77-47ee-bede-f80eb24e3f5c',{method:'POST',headers:{'Content-Type':'application/json','X-Debug-Session-Id':'9313fb'},body:JSON.stringify({sessionId:'9313fb',runId:'pre',hypothesisId:'C',location:'contact.html:afterFetch',message:'fetch resolved',data:{elapsedMs: Date.now() - submitStartTs,status: response && response.status,ok: response && response.ok},timestamp:Date.now()})}).catch(()=>{});
                        // #endregion

                        clearTimeout(timeoutId);
                    } catch (fetchError) {
                        // Handle network errors, CORS, timeouts, etc.
                        console.error('Fetch error:', fetchError);
                        console.log('[contact] fetch failed with', fetchError && fetchError.name, fetchError && fetchError.message);
                        // #region agent log contact fetch error
                        fetch('http://127.0.0.1:7242/ingest/6a51373e-0e77-47ee-bede-f80eb24e3f5c',{method:'POST',headers:{'Content-Type':'application/json','X-Debug-Session-Id':'9313fb'},body:JSON.stringify({sessionId:'9313fb',runId:'pre',hypothesisId:'B',location:'contact.html:fetchCatch',message:'fetch threw',data:{elapsedMs: Date.now() - submitStartTs,clientTimeoutFired: clientTimeoutFired,fetchErrorName: fetchError && fetchError.name,fetchErrorMessage: fetchError && fetchError.message},timestamp:Date.now()})}).catch(()=>{});
                        // #endregion
                        if (fetchError.name === 'AbortError') {
                            throw new Error('Request timed out. Please check your connection and try again.');
                        } else if (fetchError.message && fetchError.message.includes('message channel')) {
                            // Browser extension interference - try again or show friendly message
                            throw new Error('Browser extension interference detected. Please disable extensions and try again, or refresh the page.');
                        } else {
                            throw new Error('Network error: ' + (fetchError.message || 'Failed to connect to server'));
                        }
                    }

                    if (!response.ok) {
                        let errorMessage = null;
                        const contentType = response.headers.get('content-type');
                        
                        try {
                            if (contentType && contentType.includes('application/json')) {
                                const errorData = await response.json();
                                errorMessage = errorData.message || errorData.error || errorData.details || `Server error: ${response.status}`;
                                console.error('API Error (JSON):', errorData);
                            } else {
                                const text = await response.text();
                                errorMessage = text.trim() || `Server error: ${response.status}`;
                                console.error('API Error (Text):', text);
                            }
                        } catch (parseError) {
                            console.error('Failed to parse error response:', parseError);
                            errorMessage = `Server error: ${response.status} ${response.statusText || ''}`;
                        }
                        
                        // Ensure we have a meaningful error message
                        if (!errorMessage || errorMessage.trim() === '' || errorMessage === '---') {
                            errorMessage = `Failed to send message. Server returned ${response.status}. Please try again.`;
                        }
                        
                        throw new Error(errorMessage);
                    }

                    const result = await response.json();
                    // #region agent log contact emailNotificationSent
                    try {
                        const sentVal = (result && typeof result.emailNotificationSent === 'boolean')
                            ? result.emailNotificationSent
                            : null;
                        console.log('[contact-debug] emailNotificationSent from API', { emailNotificationSent: sentVal, resultKeys: result && typeof result === 'object' ? Object.keys(result) : [] });
                        fetch('http://127.0.0.1:7242/ingest/6a51373e-0e77-47ee-bede-f80eb24e3f5c', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json', 'X-Debug-Session-Id': '9313fb' },
                            body: JSON.stringify({
                                sessionId: '9313fb',
                                runId: 'pre',
                                hypothesisId: 'E',
                                location: 'contact.html:emailNotificationSent',
                                message: 'parsed response.json()',
                                data: { emailNotificationSent: sentVal },
                                timestamp: Date.now()
                            })
                        }).catch(function(){});
                    } catch (_) {}
                    // #endregion
                    const emailNotificationSentKnown = typeof result?.emailNotificationSent === 'boolean'
                        ? result.emailNotificationSent
                        : null; // If backend doesn't provide the field yet (older deployments), treat as unknown.

                    const successMsg = typeof window.TranslationManager !== 'undefined'
                        ? window.TranslationManager.t('contact.success')
                        : '✓ Email sent successfully! Thank you for reaching out. I\'ll get back to you soon.';
                    
                    const emailFailedMsg = typeof window.TranslationManager !== 'undefined'
                        ? window.TranslationManager.t('contact.emailNotificationFailed')
                        : 'Message received, but email notification failed. Please try again later.';

                    const emailUnknownMsg = typeof window.TranslationManager !== 'undefined'
                        ? window.TranslationManager.t('contact.emailNotificationUnknown')
                        : 'Message received, but email notification status is unknown. Please try again later.';

                    // If message is stored but email delivery fails, show an error-style message.
                    // This prevents misleading "success" when the email provider/config is broken.
                    const showSuccess = emailNotificationSentKnown === true;
                    const showMsg = showSuccess ? successMsg : (emailNotificationSentKnown === false ? emailFailedMsg : emailUnknownMsg);
                    // #region agent log showMessage inputs
                    try {
                        fetch('http://127.0.0.1:7242/ingest/6a51373e-0e77-47ee-bede-f80eb24e3f5c', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json', 'X-Debug-Session-Id': '9313fb' },
                            body: JSON.stringify({
                                sessionId: '9313fb',
                                runId: 'pre',
                                hypothesisId: 'F',
                                location: 'contact.html:showMessage:before',
                                message: 'before showMessage',
                                data: {
                                    emailNotificationSentKnown,
                                    showSuccess,
                                    showMsgTrim: typeof showMsg === 'string' ? showMsg.trim() : null,
                                    showMsgLength: typeof showMsg === 'string' ? showMsg.length : null
                                },
                                timestamp: Date.now()
                            })
                        }).catch(function(){});
                    } catch (_) {}
                    // #endregion
                    showMessage(showMsg, !showSuccess);
                    // #region agent log showMessage results
                    try {
                        const contactSuccessBlock = document.getElementById('contact-success-block');
                        const contactErrorBlock = document.getElementById('contact-error-block');
                        const alertCandidates = Array.from(
                            document.querySelectorAll('#form-message, [role="alert"], .alert-success, .alert-danger')
                        );
                        const alertSnapshot = alertCandidates.slice(0, 10).map(el => ({
                            id: el.id || null,
                            className: el.className || null,
                            textTrim: (el.textContent && el.textContent.trim()) ? el.textContent.trim().slice(0, 200) : null,
                            display: getComputedStyle(el).display,
                            visibility: getComputedStyle(el).visibility,
                            opacity: getComputedStyle(el).opacity
                        }));
                        fetch('http://127.0.0.1:7242/ingest/6a51373e-0e77-47ee-bede-f80eb24e3f5c', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json', 'X-Debug-Session-Id': '9313fb' },
                            body: JSON.stringify({
                                sessionId: '9313fb',
                                runId: 'pre',
                                hypothesisId: 'F',
                                location: 'contact.html:showMessage:after',
                                message: 'after showMessage',
                                data: {
                                    formMessageExists: !!messageDiv,
                                    formMessageTextTrim: messageDiv && messageDiv.textContent ? messageDiv.textContent.trim() : null,
                                    formMessageClass: messageDiv ? messageDiv.className : null,
                                    formMessageDisplay: messageDiv ? getComputedStyle(messageDiv).display : null,
                                    formMessageColor: messageDiv ? getComputedStyle(messageDiv).color : null,
                                    formMessageBackground: messageDiv ? getComputedStyle(messageDiv).backgroundColor : null,
                                    formMessageOpacity: messageDiv ? getComputedStyle(messageDiv).opacity : null,
                                    formMessageVisibility: messageDiv ? getComputedStyle(messageDiv).visibility : null,
                                    formMessageFontSize: messageDiv ? getComputedStyle(messageDiv).fontSize : null,
                                    formMessageHeight: messageDiv ? messageDiv.getBoundingClientRect().height : null,
                                    formMessageWidth: messageDiv ? messageDiv.getBoundingClientRect().width : null,
                                    formMessageOffsetHeight: messageDiv ? messageDiv.offsetHeight : null,
                                    formMessageInnerTextTrim: messageDiv && messageDiv.innerText ? messageDiv.innerText.trim() : null,
                                    viewportHeight: window.innerHeight,
                                    formMessageRect: messageDiv ? {
                                        top: messageDiv.getBoundingClientRect().top,
                                        bottom: messageDiv.getBoundingClientRect().bottom
                                    } : null,
                                    alertSnapshot,
                                    contactSuccessBlockExists: !!contactSuccessBlock,
                                    contactSuccessBlockTextTrim: contactSuccessBlock && contactSuccessBlock.textContent ? contactSuccessBlock.textContent.trim() : null,
                                    contactSuccessBlockDisplay: contactSuccessBlock ? getComputedStyle(contactSuccessBlock).display : null,
                                    contactErrorBlockExists: !!contactErrorBlock,
                                    contactErrorBlockTextTrim: contactErrorBlock && contactErrorBlock.textContent ? contactErrorBlock.textContent.trim() : null,
                                    contactErrorBlockDisplay: contactErrorBlock ? getComputedStyle(contactErrorBlock).display : null
                                },
                                timestamp: Date.now()
                            })
                        }).catch(function(){});
                    } catch (_) {}
                    // #endregion
                    form.reset();
                    // #region agent log contact after form.reset messageDiv text
                    try {
                        fetch('http://127.0.0.1:7242/ingest/6a51373e-0e77-47ee-bede-f80eb24e3f5c', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json', 'X-Debug-Session-Id': '9313fb' },
                            body: JSON.stringify({
                                sessionId: '9313fb',
                                runId: 'pre',
                                hypothesisId: 'G',
                                location: 'contact.html:afterFormReset',
                                message: 'after form.reset',
                                data: {
                                    formMessageTextTrim: messageDiv && messageDiv.textContent ? messageDiv.textContent.trim() : null,
                                    formMessageClass: messageDiv ? messageDiv.className : null,
                                    formMessageDisplay: messageDiv ? getComputedStyle(messageDiv).display : null,
                                    formMessageVisibility: messageDiv ? getComputedStyle(messageDiv).visibility : null,
                                    formMessageOpacity: messageDiv ? getComputedStyle(messageDiv).opacity : null
                                },
                                timestamp: Date.now()
                            })
                        }).catch(function(){});
                    } catch (_) {}
                    // #endregion
                    
                    // Reset Turnstile widget if it exists
                    if (typeof turnstile !== 'undefined' && isTurnstileConfigured()) {
                        try {
                            turnstile.reset();
                        } catch (e) {
                            console.warn('Failed to reset Turnstile:', e);
                        }
                    }
                } catch (error) {
                    console.error('Error submitting contact form:', error);
                    console.error('Error stack:', error.stack);
                    // #region agent log contact outer catch
                    try {
                        const errMsg = error && error.message ? error.message : String(error);
